<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cc0000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#990000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="60%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="192" height="192" rx="40" ry="40" fill="url(#bgGrad)"/>
  <rect width="192" height="96" rx="40" ry="40" fill="url(#shineGrad)"/>
  <rect x="0" y="96" width="192" height="96" rx="0" fill="#000" opacity="0.18"/>
  <circle cx="96" cy="78" r="34" fill="white" opacity="0.95" filter="url(#shadow)"/>
  <polygon points="90,65 90,91 114,78" fill="#cc0000"/>
  <text x="96" y="132" font-family="'Arial Black', Arial, sans-serif" font-size="21" font-weight="900" fill="white" text-anchor="middle" letter-spacing="0.5" filter="url(#textShadow)">Stream</text>
  <text x="96" y="158" font-family="'Arial Black', Arial, sans-serif" font-size="32" font-weight="900" fill="white" text-anchor="middle" opacity="0.9" filter="url(#textShadow)">x</text>
  <rect x="66" y="168" width="60" height="2.5" rx="1.25" fill="white" opacity="0.4"/>
</svg>
