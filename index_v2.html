
<!DOCTYPE html>
<html>
<head>
  <title>MyTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    header {
      padding: 15px;
      font-size: 22px;
      font-weight: bold;
      background: #202020;
      text-align: center;
    }

    .container {
      padding: 15px;
    }

    .upload-box {
      background: #1c1c1c;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border-radius: 5px;
      border: none;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      background: red;
      color: white;
      border: none;
      width: 100%;
      border-radius: 5px;
      font-weight: bold;
    }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .card {
      background: #1c1c1c;
      border-radius: 10px;
      overflow: hidden;
    }

    .card img {
      width: 100%;
    }

    .info {
      padding: 10px;
    }

    .actions {
      display: flex;
      justify-content: space-around;
      padding: 10px;
      border-top: 1px solid #333;
    }

    .actions span {
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>🔥 MyTube</header>

<div class="container">

  <!-- Upload Section -->
  <div class="upload-box">
    <h3>Upload</h3>

    <input type="file" id="fileInput" accept="image/*" />
    <input type="text" id="title" placeholder="Title" />
    <textarea id="desc" placeholder="Description"></textarea>

    <button onclick="upload()">Upload</button>
  </div>

  <!-- Feed -->
  <div class="feed" id="feed"></div>

</div>

<script>

const CLOUD_NAME = "dyrjyet9o";
const PRESET = "mytube_upload";

async function upload() {

  const file = document.getElementById("fileInput").files[0];
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;

  if (!file) return alert("Select file");

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", PRESET);

  try {
    const res = await fetch(`https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (!res.ok) {
      alert("Upload failed");
      console.log(data);
      return;
    }

    addToFeed(data.secure_url, title, desc);

  } catch (err) {
    console.log(err);
    alert("Error");
  }
}

function addToFeed(url, title, desc) {

  const feed = document.getElementById("feed");

  const card = document.createElement("div");
  card.className = "card";

  const time = new Date().toLocaleTimeString();

  card.innerHTML = `
    <img src="${url}" />
    <div class="info">
      <h4>${title || "No Title"}</h4>
      <p>${desc || ""}</p>
      <small>${time}</small>
    </div>
    <div class="actions">
      <span onclick="like(this)">👍 0</span>
      <span onclick="comment()">💬</span>
      <span onclick="share('${url}')">🔗</span>
    </div>
  `;

  feed.prepend(card);
}

function like(el) {
  let count = parseInt(el.innerText.split(" ")[1]);
  count++;
  el.innerText = `👍 ${count}`;
}

function comment() {
  alert("Comment system coming soon 💬");
}

function share(url) {
  navigator.clipboard.writeText(url);
  alert("Link copied 🔗");
}

</script>

</body>
  </html>
