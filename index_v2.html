
<!DOCTYPE html>
<html>
<head>
  <title>MyTube Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0f0f0f;
      color: white;
    }

    header {
      padding: 15px;
      text-align: center;
      font-size: 22px;
      background: #202020;
    }

    .container {
      padding: 15px;
    }

    button {
      padding: 10px;
      margin-top: 10px;
      width: 100%;
      border: none;
      background: red;
      color: white;
      border-radius: 5px;
    }

    input, textarea {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      border: none;
      border-radius: 5px;
    }

    .options {
      display: none;
      gap: 10px;
      margin-top: 10px;
    }

    .options button {
      flex: 1;
      background: #333;
    }

    .feed, .shorts {
      margin-top: 20px;
    }

    .card {
      background: #1c1c1c;
      margin-bottom: 15px;
      border-radius: 10px;
      overflow: hidden;
    }

    .card img, .card video {
      width: 100%;
    }

    .info {
      padding: 10px;
    }

    .actions {
      display: flex;
      justify-content: space-around;
      padding: 10px;
      border-top: 1px solid #333;
    }

    .shorts video {
      height: 400px;
      object-fit: cover;
    }

  </style>
</head>

<body>

<header>🔥 MyTube Pro</header>

<div class="container">

  <!-- Upload Button -->
  <button onclick="toggleOptions()">Create</button>

  <!-- Options -->
  <div class="options" id="options">
    <button onclick="selectType('image')">Image</button>
    <button onclick="selectType('video')">Video</button>
    <button onclick="selectType('post')">Post</button>
  </div>

  <!-- Upload Box -->
  <div id="uploadBox" style="display:none;">
    <input type="file" id="fileInput" />
    <input type="text" id="title" placeholder="Title" />
    <textarea id="desc" placeholder="Description"></textarea>

    <button onclick="upload()">Upload</button>
  </div>

  <!-- Feed -->
  <div class="feed" id="feed"></div>

  <!-- Shorts -->
  <h3>🔥 Shorts</h3>
  <div class="shorts" id="shorts"></div>

</div>

<script>

const CLOUD = "dyrjyet9o";
const PRESET = "mytube_upload";

let currentType = "";

function toggleOptions() {
  const opt = document.getElementById("options");
  opt.style.display = opt.style.display === "flex" ? "none" : "flex";
}

function selectType(type) {
  currentType = type;
  document.getElementById("uploadBox").style.display = "block";

  const fileInput = document.getElementById("fileInput");

  if (type === "image") fileInput.accept = "image/*";
  if (type === "video") fileInput.accept = "video/*";
  if (type === "post") fileInput.style.display = "none";
  else fileInput.style.display = "block";
}

async function upload() {

  const file = document.getElementById("fileInput").files[0];
  const title = document.getElementById("title").value;
  const desc = document.getElementById("desc").value;

  if (currentType !== "post" && !file) {
    return alert("Select file");
  }

  let url = "";

  if (currentType !== "post") {

    const formData = new FormData();
    formData.append("file", file);
    formData.append("upload_preset", PRESET);

    const endpoint = currentType === "video"
      ? `https://api.cloudinary.com/v1_1/${CLOUD}/video/upload`
      : `https://api.cloudinary.com/v1_1/${CLOUD}/image/upload`;

    const res = await fetch(endpoint, {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (!res.ok) {
      alert("Upload failed");
      console.log(data);
      return;
    }

    url = data.secure_url;
  }

  addToFeed(url, title, desc, currentType);
}

function addToFeed(url, title, desc, type) {

  const feed = document.getElementById("feed");

  let media = "";

  if (type === "image") media = `<img src="${url}" />`;
  if (type === "video") media = `<video controls src="${url}"></video>`;
  if (type === "post") media = `<div style="padding:20px;">${desc}</div>`;

  const time = new Date().toLocaleTimeString();

  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    ${media}
    <div class="info">
      <h4>${title || "No Title"}</h4>
      <p>${desc || ""}</p>
      <small>${time}</small>
    </div>
    <div class="actions">
      <span onclick="like(this)">👍 0</span>
      <span onclick="share('${url}')">🔗</span>
    </div>
  `;

  feed.prepend(card);

  // Shorts auto add (video only)
  if (type === "video") {
    const shorts = document.getElementById("shorts");

    const vid = document.createElement("video");
    vid.src = url;
    vid.controls = true;

    shorts.prepend(vid);
  }

}

function like(el) {
  let n = parseInt(el.innerText.split(" ")[1]);
  el.innerText = `👍 ${n + 1}`;
}

function share(url) {
  navigator.clipboard.writeText(url);
  alert("Link copied");
}

</script>

</body>
</html>
