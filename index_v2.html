<!DOCTYPE html>
<html>
<head>
  <title>MyTube Pro</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>

  <style>
    body{margin:0;font-family:Arial;background:#0f0f0f;color:white;}
    header{display:flex;gap:10px;padding:10px;background:#202020;}
    .search{flex:1;padding:8px;background:#222;color:white;border:none;border-radius:5px}
    .nav{display:flex;justify-content:space-around;background:#202020;padding:10px;}
    .nav button{background:none;color:white;border:none}
    .container{padding:10px;}
    .card{background:#1c1c1c;margin-bottom:15px;border-radius:10px;overflow:hidden;}
    .card img,.card video{width:100%;}
    .actions{display:flex;justify-content:space-around;padding:10px;}
    input,textarea{width:100%;padding:10px;margin-top:10px;background:#222;color:white;border:none}
    button{padding:10px;width:100%;margin-top:10px;background:red;color:white;border:none}
    .tab{display:none;}
    .comment{padding:5px;border-bottom:1px solid #444;}
  </style>
</head>

<body>

<header>
  <input class="search" placeholder="Search..." oninput="search(this.value)">
</header>

<div id="loginBox" class="container">
  <input id="email" placeholder="Email">
  <input id="password" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <button onclick="signup()">Signup</button>

  <!-- ✅ Google Button -->
  <button onclick="googleLogin()" style="background:#fff;color:#000;">
    🔵 Continue with Google
  </button>
</div>

<div id="app" style="display:none;">

<div class="nav">
  <button onclick="showTab('home')">🏠</button>
  <button onclick="showTab('shorts')">🎬</button>
  <button onclick="showTab('upload')">➕</button>
  <button onclick="showTab('dashboard')">📊</button>
  <button onclick="showTab('profile')">👤</button>
</div>

<div class="container">

<div id="home" class="tab"><div id="feed"></div></div>
<div id="shorts" class="tab"><div id="shortsContainer"></div></div>

<div id="upload" class="tab">
  <button onclick="type='image'">Image</button>
  <button onclick="type='video'">Video</button>
  <button onclick="type='post'">Post</button>

  <input type="file" id="fileInput">
  <input id="title" placeholder="Title">
  <textarea id="desc"></textarea>

  <button onclick="upload()">Upload</button>
</div>

<div id="dashboard" class="tab">
  <p>Posts: <span id="p">0</span></p>
  <p>Videos: <span id="v">0</span></p>
  <p>Likes: <span id="l">0</span></p>
</div>

<div id="profile" class="tab">
  <p id="userEmail"></p>
  <p>Subscribers: <span id="subCount">0</span></p>
  <button onclick="subscribe()">Subscribe</button>
  <button onclick="logout()">Logout</button>
</div>

</div>
</div>

<script>

// Firebase config
const firebaseConfig = {
  apiKey: "AIzaSyDx-r77MAJ_7jK7foeBE0P3RiTSPNIQgSE",
  authDomain: "my-tube-e526b.firebaseapp.com",
  projectId: "my-tube-e526b",
  storageBucket: "my-tube-e526b.firebasestorage.app",
  messagingSenderId: "948348267378",
  appId: "1:948348267378:web:2dd25f59a9f510a8694beb"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

auth.onAuthStateChanged(user=>{
  if(user){
    loginBox.style.display="none";
    app.style.display="block";
    userEmail.innerText=user.email || user.displayName;
    showTab("home");
  }
});

// AUTH
function signup(){auth.createUserWithEmailAndPassword(email.value,password.value)}
function login(){auth.signInWithEmailAndPassword(email.value,password.value)}
function logout(){auth.signOut()}

// ✅ GOOGLE LOGIN
function googleLogin(){
  const provider = new firebase.auth.GoogleAuthProvider();

  auth.signInWithPopup(provider)
    .then(result=>{
      alert("Welcome " + result.user.displayName);
    })
    .catch(err=>{
      alert(err.message);
      console.log(err);
    });
}

// TABS
function showTab(t){
  document.querySelectorAll(".tab").forEach(x=>x.style.display="none");
  document.getElementById(t).style.display="block";
}

// UPLOAD
let type="image",posts=0,videos=0,likes=0;

async function upload(){
  let file=fileInput.files[0];
  let url="";

  if(type!=="post"){
    let fd=new FormData();
    fd.append("file",file);
    fd.append("upload_preset","mytube_upload");

    let endpoint= type==="video"
      ? "https://api.cloudinary.com/v1_1/dyrjyet9o/video/upload"
      : "https://api.cloudinary.com/v1_1/dyrjyet9o/image/upload";

    let res=await fetch(endpoint,{method:"POST",body:fd});
    let data=await res.json();

    if(!res.ok){alert("Upload failed");return;}

    url=data.secure_url;
  }

  let doc = await db.collection("posts").add({
    url,title:title.value,desc:desc.value,type,time:Date.now()
  });

  add(doc.id,url,title.value,desc.value,type);
}

// LOAD POSTS
window.onload = ()=>{
  db.collection("posts").orderBy("time","desc").onSnapshot(snap=>{
    feed.innerHTML="";
    shortsContainer.innerHTML="";
    posts=0; videos=0;

    snap.forEach(doc=>{
      let d=doc.data();
      add(doc.id,d.url,d.title,d.desc,d.type);
    });
  });

  db.collection("subs").onSnapshot(s=>{
    subCount.innerText=s.size;
  });
};

// ADD POST
function add(id,url,title,desc,type){

  posts++; if(type==="video") videos++;
  p.innerText=posts; v.innerText=videos;

  let media="";
  if(type==="image") media=`<img src="${url}">`;
  if(type==="video") media=`<video controls src="${url}"></video>`;
  if(type==="post") media=`<div>${desc}</div>`;

  let d=document.createElement("div");
  d.className="card";

  d.innerHTML=`
  ${media}
  <div>${title}</div>
  <div class="actions">
    <span onclick="like('${id}',this)">👍 0</span>
    <span onclick="share('${url}')">🔗</span>
  </div>

  <div id="c-${id}"></div>
  <input id="i-${id}" placeholder="Comment...">
  <button onclick="comment('${id}')">Comment</button>
  `;

  feed.prepend(d);

  if(type==="video"){
    let v=document.createElement("video");
    v.src=url; v.controls=true;
    shortsContainer.prepend(v);
  }

  db.collection("comments").where("postId","==",id)
  .onSnapshot(s=>{
    let box=document.getElementById("c-"+id);
    box.innerHTML="";
    s.forEach(doc=>{
      let div=document.createElement("div");
      div.className="comment";
      div.innerText=doc.data().text;
      box.appendChild(div);
    });
  });
}

// COMMENT
async function comment(id){
  let input=document.getElementById("i-"+id);
  if(!input.value.trim()) return;

  await db.collection("comments").add({
    postId:id,
    text:input.value,
    time:Date.now()
  });

  input.value="";
}

// LIKE
async function like(id,el){
  let n=parseInt(el.innerText.split(" ")[1])+1;
  el.innerText="👍 "+n;
  likes++; l.innerText=likes;

  await db.collection("likes").add({postId:id});
}

// SHARE
function share(url){
  navigator.clipboard.writeText(url);
  alert("Copied");
}

// SUBSCRIBE
async function subscribe(){
  await db.collection("subs").add({
    user:auth.currentUser.email
  });
}

// SEARCH
function search(q){
  document.querySelectorAll(".card").forEach(card=>{
    card.style.display = card.innerText.toLowerCase().includes(q.toLowerCase()) ? "block":"none";
  });
}

</script>

</body>
</html>
