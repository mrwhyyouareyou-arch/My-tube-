<!DOCTYPE html><html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MyTube Upload</title>
  <style>
    body {
      background: black;
      color: white;
      font-family: Arial;
      text-align: center;
    }.box {
  margin-top: 50px;
}

input {
  padding: 10px;
  width: 80%;
  margin: 10px 0;
  border-radius: 5px;
  border: none;
}

button {
  background: red;
  color: white;
  padding: 10px 20px;
  border: none;
  margin-top: 10px;
  cursor: pointer;
  border-radius: 5px;
}

button:disabled {
  background: gray;
  cursor: not-allowed;
}

video {
  width: 280px;
  margin-top: 10px;
  border-radius: 10px;
}

.feed {
  margin-top: 40px;
}

.card {
  margin-top: 20px;
}

.title {
  font-size: 16px;
  margin-bottom: 5px;
}

  </style>
</head><body><div class="box">
  <h2>🎬 Upload Video</h2>  <!-- 🔥 TITLE INPUT -->  <input type="text" id="title" placeholder="Enter video title">  <input type="file" id="fileInput" accept="video/*" />
  <br>  <!-- 🔥 BUTTON WITH ID --><button id="uploadBtn" onclick="uploadVideo()">Upload Video</button>

  <p id="status"></p><video id="preview" controls style="display:none;"></video>

</div><div class="feed">
  <h2>🔥 MyTube Feed</h2>
  <div id="videos"></div>
</div><script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, addDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDx-r77MAJ_7jK7foeBE0P3RiTSPNIQgSE",
  authDomain: "my-tube-e526b.firebaseapp.com",
  projectId: "my-tube-e526b",
  storageBucket: "my-tube-e526b.firebasestorage.app",
  messagingSenderId: "948348267378",
  appId: "1:948348267378:web:2dd25f59a9f510a8694beb",
  measurementId: "G-EQ91748HD1"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

window.uploadVideo = async () => {

  const file = document.getElementById("fileInput").files[0];
  const title = document.getElementById("title").value;
  const status = document.getElementById("status");
  const btn = document.getElementById("uploadBtn");

  if (!file) {
    alert("Select video first");
    return;
  }

  if (!title) {
    alert("Enter title first");
    return;
  }

  // 🔥 BUTTON LOADING
  btn.disabled = true;
  btn.innerText = "Uploading... ⏳";

  status.innerText = "Uploading... ⏳";

  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "mytube_upload");

  try {
    const res = await fetch("https://api.cloudinary.com/v1_1/dyrjyet9o/video/upload", {
      method: "POST",
      body: formData
    });

    const data = await res.json();

    if (!res.ok) {
      throw new Error("Upload failed");
    }

    // ✅ Preview
    const video = document.getElementById("preview");
    video.src = data.secure_url;
    video.style.display = "block";

    status.innerText = "Upload success ✅";

    // 🔥 SAVE TO FIREBASE (with title)
    await addDoc(collection(db, "videos"), {
      url: data.secure_url,
      title: title,
      createdAt: new Date()
    });

    // reset fields
    document.getElementById("title").value = "";
    document.getElementById("fileInput").value = "";

    loadVideos();

  } catch (err) {
    console.error(err);
    status.innerText = "Error ❌";
    alert(err.message);
  }

  // 🔥 BUTTON RESET
  btn.disabled = false;
  btn.innerText = "Upload Video";
};

// 📺 LOAD VIDEOS
async function loadVideos() {
  const container = document.getElementById("videos");
  container.innerHTML = "";

  const querySnapshot = await getDocs(collection(db, "videos"));

  querySnapshot.forEach((doc) => {
    const data = doc.data();

    const card = document.createElement("div");
    card.className = "card";

    const title = document.createElement("div");
    title.className = "title";
    title.innerText = data.title || "No Title";

    const video = document.createElement("video");
    video.src = data.url;
    video.controls = true;

    card.appendChild(title);
    card.appendChild(video);

    container.appendChild(card);
  });
}

loadVideos();

</script></body>
                                   </html>
