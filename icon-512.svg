<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#cc0000;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff0000;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#990000;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="shineGrad" x1="0%" y1="0%" x2="0%" y2="60%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:0.18" />
      <stop offset="100%" style="stop-color:#ffffff;stop-opacity:0" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#000" flood-opacity="0.35"/>
    </filter>
    <filter id="textShadow">
      <feDropShadow dx="0" dy="2" stdDeviation="5" flood-color="#000" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="100" ry="100" fill="url(#bgGrad)"/>
  <rect width="512" height="256" rx="100" ry="100" fill="url(#shineGrad)"/>
  <rect x="0" y="256" width="512" height="256" rx="0" fill="#000" opacity="0.18"/>
  <circle cx="256" cy="204" r="90" fill="white" opacity="0.95" filter="url(#shadow)"/>
  <polygon points="238,172 238,236 302,204" fill="#cc0000"/>
  <text x="256" y="350" font-family="'Arial Black', Arial, sans-serif" font-size="58" font-weight="900" fill="white" text-anchor="middle" letter-spacing="1" filter="url(#textShadow)">Stream</text>
  <text x="256" y="425" font-family="'Arial Black', Arial, sans-serif" font-size="88" font-weight="900" fill="white" text-anchor="middle" opacity="0.9" filter="url(#textShadow)">x</text>
  <rect x="176" y="450" width="160" height="7" rx="3.5" fill="white" opacity="0.4"/>
</svg>
