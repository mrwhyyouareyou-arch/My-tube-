<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTube Pro - Fx Sports</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getDocs, addDoc, collection, getFirestore, serverTimestamp, query, orderBy } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

        // ✅ SCREENSHOT VERIFIED CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyDx-r77MAJ_TjK7foBE0P3R1TSPNIQQSE",
            authDomain: "my-tube-e526b.firebaseapp.com",
            projectId: "my-tube-e526b",
            storageBucket: "my-tube-e526b.firebasestorage.app",
            messagingSenderId: "948348267378",
            appId: "1:948348267378:web:2dd25f59a9f510a8694beb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. Home View - Video Cards display logic
        const loadHome = async () => {
            const main = document.getElementById('content');
            main.innerHTML = '<div class="flex justify-center p-20"><div class="animate-spin rounded-full h-8 w-8 border-b-2 border-red-600"></div></div>';
            
            try {
                // Sorting by newest first
                const q = query(collection(db, "videos"), orderBy("createdAt", "desc"));
                const snap = await getDocs(q);
                
                if (snap.empty) {
                    main.innerHTML = '<p class="p-10 text-center text-gray-500 text-sm">No videos yet. Click "+" to add!</p>';
                    return;
                }

                let html = '<div class="flex flex-col gap-6 p-4 max-w-md mx-auto">';
                snap.forEach(doc => {
                    const v = doc.data();
                    html += `
                        <div class="bg-gray-900 rounded-xl overflow-hidden shadow-2xl border border-gray-800">
                            <video controls class="w-full aspect-video bg-black" poster="${v.thumbnail || 'https://picsum.photos/400/225'}">
                                <source src="${v.url}" type="video/mp4">
                            </video>
                            <div class="p-4">
                                <h3 class="font-bold text-base text-white line-clamp-2">${v.title || 'Fx Sports Match Update'}</h3>
                                <div class="flex items-center gap-2 mt-2">
                                    <div class="w-6 h-6 bg-red-600 rounded-full"></div>
                                    <span class="text-xs text-gray-400 font-medium text-uppercase">Match Preview & Analysis</span>
                                </div>
                            </div>
                        </div>
                    `;
                });
                main.innerHTML = html + '</div>';
            } catch (e) { 
                console.error("Home Load Error:", e);
                main.innerHTML = `<p class="p-10 text-red-500 text-center">Error: ${e.message}</p>`; 
            }
        };

        // 2. Post Logic
        window.postVideo = async () => {
            const t = document.getElementById('t').value;
            const u = document.getElementById('u').value;
            const btn = document.getElementById('btn');
            
            if(!t || !u) return alert("Bhai, Title aur Link dono chahiye!");
            
            btn.disabled = true;
            btn.innerText = "Posting...";

            try {
                await addDoc(collection(db, "videos"), { 
                    title: t, 
                    url: u, 
                    thumbnail: "https://picsum.photos/400/225",
                    createdAt: serverTimestamp() 
                });
                alert("Mubarak ho! Video post ho gayi.");
                window.nav('home');
            } catch (e) {
                alert("Error: " + e.message);
                btn.disabled = false;
                btn.innerText = "Post Now";
            }
        };

        // 3. Navigation Logic
        window.nav = (page) => {
            const main = document.getElementById('content');
            if(page === 'home') loadHome();
            if(page === 'add') {
                main.innerHTML = `
                    <div class="p-6 flex flex-col gap-5 animate-pulse-once">
                        <h2 class="text-2xl font-black text-white">UPLOAD PREVIEW</h2>
                        <div class="flex flex-col gap-2">
                            <label class="text-xs text-gray-500 font-bold ml-1 uppercase">Video Title</label>
                            <input id="t" type="text" placeholder="e.g. Cricket Match Preview" class="bg-gray-800 p-4 rounded-lg outline-none border border-gray-700 focus:border-red-600 text-white">
                        </div>
                        <div class="flex flex-col gap-2">
                            <label class="text-xs text-gray-500 font-bold ml-1 uppercase">Direct MP4 Link</label>
                            <input id="u" type="text" placeholder="https://..." class="bg-gray-800 p-4 rounded-lg outline-none border border-gray-700 focus:border-red-600 text-white text-sm">
                        </div>
                        <button id="btn" onclick="postVideo()" class="bg-red-600 py-4 rounded-xl font-black text-white shadow-lg shadow-red-900/20 active:scale-95 transition-transform mt-2">POST TO CHANNEL</button>
                    </div>
                `;
            }
        };

        // Boot
        window.onload = () => loadHome();
    </script>
    <style>
        @keyframes pulse-once { 0% { opacity: 0; transform: translateY(10px); } 100% { opacity: 1; transform: translateY(0); } }
        .animate-pulse-once { animation: pulse-once 0.4s ease-out; }
    </style>
</head>
<body class="bg-black text-white antialiased selection:bg-red-600/30">

    <header class="sticky top-0 z-50 p-4 bg-black/80 backdrop-blur-md border-b border-gray-800 flex justify-between items-center">
        <div class="flex items-center gap-2">
            <div class="w-8 h-8 bg-red-600 rounded-lg flex items-center justify-center font-black italic">Fx</div>
            <span class="font-black text-xl tracking-tighter">MyTube</span>
        </div>
        <div class="text-gray-400">🔍</div>
    </header>

    <div id="content" class="pb-24"></div>

    <nav class="fixed bottom-0 w-full bg-black/90 backdrop-blur-lg border-t border-gray-800 flex justify-around py-4 z-50">
        <button onclick="nav('home')" class="flex flex-col items-center gap-1 group">
            <span class="text-2xl group-active:scale-125 transition-transform">🏠</span>
            <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">Home</span>
        </button>
        <button onclick="nav('add')" class="flex flex-col items-center gap-1 group">
            <div class="w-12 h-8 bg-white text-black rounded-lg flex items-center justify-center font-bold text-xl group-active:scale-90 transition-transform">+</div>
            <span class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mt-1">Post</span>
        </button>
    </nav>

</body>
</html>
