<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyTube Free</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
        import { getDocs, addDoc, collection, getFirestore, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-firestore.js";

        // ✅ SCREENSHOT MATCHED: Your actual Firebase Config
        const firebaseConfig = {
            apiKey: "AIzaSyDx-r77MAJ_TjK7foBE0P3R1TSPNIQQSE",
            authDomain: "my-tube-e526b.firebaseapp.com",
            projectId: "my-tube-e526b",
            storageBucket: "my-tube-e526b.firebasestorage.app",
            messagingSenderId: "948348267378",
            appId: "1:948348267378:web:2dd25f59a9f510a8694beb"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 1. Fetch Videos from Database
        const loadHome = async () => {
            const main = document.getElementById('content');
            main.innerHTML = '<p class="p-10 text-center">Loading...</p>';
            try {
                const snap = await getDocs(collection(db, "videos"));
                let html = '<div class="grid grid-cols-1 gap-4 p-2">';
                snap.forEach(doc => {
                    const v = doc.data();
                    html += `
                        <div class="bg-gray-900 rounded-lg overflow-hidden shadow-md">
                            <video controls class="w-full aspect-video" poster="${v.thumbnail || 'https://picsum.photos/400/225'}">
                                <source src="${v.url}" type="video/mp4">
                            </video>
                            <div class="p-3">
                                <h3 class="font-bold text-sm">${v.title || 'No Title'}</h3>
                            </div>
                        </div>
                    `;
                });
                main.innerHTML = html + '</div>';
            } catch (e) { main.innerHTML = `<p class="p-10 text-red-500">Error: ${e.message}</p>`; }
        };

        // 2. Add Video via Link
        window.postVideo = async () => {
            const t = document.getElementById('t').value;
            const u = document.getElementById('u').value;
            const btn = document.getElementById('btn');
            if(!t || !u) return alert("Title aur Link zaroori hain!");
            
            btn.innerText = "Posting...";
            await addDoc(collection(db, "videos"), { title: t, url: u, createdAt: serverTimestamp() });
            alert("Success!");
            window.nav('home');
        };

        // 3. Simple Nav
        window.nav = (page) => {
            const main = document.getElementById('content');
            if(page === 'home') loadHome();
            if(page === 'add') {
                main.innerHTML = `
                    <div class="p-5 flex flex-col gap-4">
                        <h2 class="text-xl font-bold">Add New Video</h2>
                        <input id="t" type="text" placeholder="Video Title" class="bg-gray-800 p-3 rounded">
                        <input id="u" type="text" placeholder="Paste MP4 Link Here" class="bg-gray-800 p-3 rounded">
                        <button id="btn" onclick="postVideo()" class="bg-red-600 py-3 rounded font-bold">Post Now</button>
                    </div>
                `;
            }
        };
        window.onload = () => loadHome();
    </script>
</head>
<body class="bg-black text-white">
    <header class="p-4 border-b border-gray-800 font-bold text-xl text-red-600">MyTube</header>
    <div id="content" class="pb-20"></div>
    <nav class="fixed bottom-0 w-full bg-gray-900 flex justify-around py-4 border-t border-gray-800">
        <button onclick="nav('home')">🏠 Home</button>
        <button onclick="nav('add')">➕ Add</button>
    </nav>
</body>
</html>
